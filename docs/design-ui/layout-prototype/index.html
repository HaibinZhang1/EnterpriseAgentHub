<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Agent Hub Layout Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="theme-light">
    <div class="prototype-shell">
      <header class="control-bar">
        <div class="brand-lockup">
          <button class="brand-badge" type="button" data-action="stage" data-stage="home" aria-label="回到主页">A</button>
          <div class="brand-copy">
            <strong>Aura Agent Hub</strong>
            <span>Enterprise Skills Workspace</span>
          </div>
        </div>
        <nav class="segment-nav" id="navMount" aria-label="一级导航"></nav>
        <div class="control-actions">
          <button class="menu-button notification-button" type="button" data-action="toggle-menu" data-menu="notifications">
            <span class="bell-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 4.75a4 4 0 0 0-4 4v2.03c0 .72-.2 1.42-.58 2.03l-1.05 1.71c-.44.72.07 1.63.92 1.63h9.42c.85 0 1.36-.91.92-1.63l-1.05-1.71A3.88 3.88 0 0 1 16 10.78V8.75a4 4 0 0 0-4-4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10.25 18.25a1.75 1.75 0 0 0 3.5 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <small class="notification-count" id="notificationCount">0</small>
          </button>
          <button class="menu-button avatar-button" type="button" data-action="toggle-menu" data-menu="avatar" id="avatarButton">
            <span class="avatar-dot" id="avatarDot">LA</span>
            <span id="avatarName">Lin Aurora</span>
          </button>
        </div>
      </header>

      <main class="stage-host">
        <div class="stage-frame" id="stageMount"></div>
      </main>

      <div id="floatingMount"></div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
