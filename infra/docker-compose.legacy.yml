version: "3.7"
services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.6-bookworm}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_agent_hub}
      POSTGRES_USER: ${POSTGRES_USER:-eah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-redis:7.4.1-bookworm}
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2024-12-18T13-15-44Z}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  api:
    image: ${API_IMAGE:-enterprise-agent-hub-api:0.1.0-p1}
    environment:
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://eah:change-me@postgres:5432/enterprise_agent_hub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-minio-secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres_data:
  redis_data:
  minio_data:
