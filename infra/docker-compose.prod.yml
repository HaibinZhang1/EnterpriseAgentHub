services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.6-bookworm}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_agent_hub}
      POSTGRES_USER: ${POSTGRES_USER:-eah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7.4.1-bookworm}
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2024-12-18T13-15-44Z}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2024-11-21T17-21-54Z}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set eah http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing eah/$${MINIO_SKILL_PACKAGE_BUCKET:-skill-packages} &&
      mc mb --ignore-existing eah/$${MINIO_SKILL_ASSET_BUCKET:-skill-assets}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-secret}
      MINIO_SKILL_PACKAGE_BUCKET: ${MINIO_SKILL_PACKAGE_BUCKET:-skill-packages}
      MINIO_SKILL_ASSET_BUCKET: ${MINIO_SKILL_ASSET_BUCKET:-skill-assets}

  api-migrate:
    image: ${API_IMAGE:-enterprise-agent-hub-api:0.1.0-p1}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eah:change-me@postgres:5432/enterprise_agent_hub}

  api-seed:
    image: ${API_IMAGE:-enterprise-agent-hub-api:0.1.0-p1}
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    command: ["npm", "run", "seed"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eah:change-me@postgres:5432/enterprise_agent_hub}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-minio-secret}
      MINIO_SKILL_PACKAGE_BUCKET: ${MINIO_SKILL_PACKAGE_BUCKET:-skill-packages}

  api:
    image: ${API_IMAGE:-enterprise-agent-hub-api:0.1.0-p1}
    depends_on:
      api-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://eah:change-me@postgres:5432/enterprise_agent_hub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-minio-secret}
      MINIO_SKILL_PACKAGE_BUCKET: ${MINIO_SKILL_PACKAGE_BUCKET:-skill-packages}
      MINIO_SKILL_ASSET_BUCKET: ${MINIO_SKILL_ASSET_BUCKET:-skill-assets}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27.3-bookworm}
    profiles: ["nginx"]
    depends_on:
      api:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
